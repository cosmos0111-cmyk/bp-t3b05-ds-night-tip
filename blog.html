        /* === RESET & BASE === */
        *, *::before, *::after {

            margin: 0;

        }

        html {

        /* === BRUTALIST VARIABLES === */
        :root {
            --brut-bg: #1a1a1a;
            --brut-bg-alt: #252525;
            --brut-text: #f0e6d2;
            --brut-accent: #ff3c00;

            --brut-font: 'Courier New', 'Nanum Gothic', 'Noto Sans KR', monospace;
            --brut-border-w: 3px;
            --brut-pad: 1.2rem;
        }

        /* === CONTAINER === */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            width: 100%;
        }

        /* === HEADER === */
        .site-header {
            background: var(--brut-bg-alt);
            border-bottom: var(--brut-border-w) solid var(--brut-accent);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 0 var(--brut-shadow);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .site-logo a {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--brut-accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1;
        }

        .site-logo a:hover {
            color: var(--brut-accent-alt);
        }

        .main-nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .main-nav a {
            color: var(--brut-text);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            padding: 0.4rem 0.8rem;
            border: 2px solid transparent;
            transition: all 0.15s ease;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .main-nav a:hover,
        .main-nav a.active {
            border-color: var(--brut-accent);
            background: var(--brut-accent);
            color: #000;
        }

        /* === HERO (페이지 타이틀) === */
        .page-hero {
            text-align: center;
            padding: 3rem 1rem 2rem;
            border-bottom: var(--brut-border-w) solid var(--brut-accent);
            margin-bottom: 2rem;
            position: relative;
        }

        .page-hero::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--brut-accent);
        }

        .page-hero h1 {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--brut-accent);
            text-shadow: 3px 3px 0 #000;
            line-height: 1.1;
        }

        .page-hero p {
            font-size: 1.1rem;
            margin-top: 0.8rem;
            color: #bbb;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* === BLOG POST === */
        .blog-post {
            background: var(--brut-bg-alt);
            border: var(--brut-border-w) solid var(--brut-border);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 8px 8px 0 var(--brut-shadow);
        }

        .blog-post::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            width: 20px;
            height: 20px;
            background: var(--brut-accent);
            z-index: -1;
        }

        .post-meta {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 1rem;

            line-height: 1.2;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            color: var(--brut-accent);

            color: #ddd;

            margin: 1.5rem 0;

        }

            color: var(--brut-accent);

        }

        }

            font-weight: 900;
            padding: 0.6rem 1.5rem;

            text-transform: uppercase;
            border: 2px solid #000;
            margin-top: 1rem;
            transition: all 0.15s;
            font-size: 1.1rem;
        }

        .post-content .cta-phone:hover {
            background: #000;
            color: var(--brut-accent);
            border-color: var(--brut-accent);
        }

            text-transform: uppercase;
            color: var(--brut-accent);

            letter-spacing: -1px;

            font-size: 1.1rem;
            font-weight: 700;
            color: var(--brut-accent-alt);
            margin-bottom: 0.4rem;

            font-size: 0.95rem;

            }

                font-size: 1.3rem;
            }

            .site-logo a {
                font-size: 1.3rem;
            }
